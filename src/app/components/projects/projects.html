<section id="projects" class="bg-slate-900 py-24 px-6 border-t border-slate-800">
  <div class="max-w-7xl mx-auto">

    <div class="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-10" appAnimateOnScroll>
      <div>
        <div class="flex items-center gap-3 mb-4">
          <div class="h-[1px] w-8 bg-[#00d2d3]"></div>
          <span class="text-[#00d2d3] text-xs font-bold uppercase tracking-widest">Portafolio</span>
        </div>
        <h2 class="text-3xl md:text-4xl font-bold text-white tracking-tight italic uppercase">Proyectos Destacados</h2>
      </div>

      <div class="flex gap-4">
        <button (click)="prev()" aria-label="Anterior"
          class="w-12 h-12 rounded-full border border-slate-700 flex items-center justify-center text-white hover:bg-[#00d2d3] hover:text-slate-900 transition-all">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
          </svg>
        </button>
        <button (click)="next()" aria-label="Siguiente"
          class="w-12 h-12 rounded-full border border-slate-700 flex items-center justify-center text-white hover:bg-[#00d2d3] hover:text-slate-900 transition-all">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
          </svg>
        </button>
      </div>
    </div>

    <!-- Tabs -->
    <div class="flex gap-1 mb-10 bg-slate-800/40 border border-slate-700/50 p-1 rounded-xl w-fit">
      <button (click)="setTab('propio')"
        [class]="activeTab() === 'propio'
          ? 'bg-[#00d2d3] text-slate-900 font-black'
          : 'text-slate-400 hover:text-white'"
        class="px-5 py-2 rounded-lg text-xs uppercase tracking-widest font-bold transition-all">
        Propios
      </button>
      <button (click)="setTab('cliente')"
        [class]="activeTab() === 'cliente'
          ? 'bg-[#00d2d3] text-slate-900 font-black'
          : 'text-slate-400 hover:text-white'"
        class="px-5 py-2 rounded-lg text-xs uppercase tracking-widest font-bold transition-all">
        Para clientes
      </button>
    </div>

    <!-- Carrusel -->
    <div class="relative overflow-hidden px-1">
      <div class="flex transition-transform duration-500 ease-in-out gap-6" [style.transform]="getTranslation()">
        @for (p of filteredProjects(); track p.title) {
          <div class="flex-shrink-0" [style.width]="cardWidth()">
            <div class="bg-slate-800/30 border border-slate-800 p-8 rounded-3xl h-[400px] flex flex-col justify-between hover:border-[#00d2d3]/30 transition-colors">
              <div>
                <span class="text-[10px] font-black uppercase tracking-[0.2em] {{p.textColor}}">
                  {{ p.type }}
                </span>
                <h3 class="text-xl font-bold text-white mt-3 mb-4">
                  {{ p.title }}
                </h3>
                <p class="text-slate-400 text-sm leading-relaxed line-clamp-4">
                  {{ p.desc }}
                </p>
              </div>
              <div class="flex flex-wrap gap-2">
                @for (t of p.tech; track t) {
                  <span class="text-[9px] bg-slate-900 text-slate-400 px-3 py-1 rounded-full border border-slate-800 font-bold uppercase">
                    {{ t }}
                  </span>
                }
              </div>
            </div>
          </div>
        }
      </div>
    </div>

    <!-- Dots indicadores -->
    @if (dots().length > 1) {
      <div class="flex justify-center gap-2 mt-8">
        @for (dot of dots(); track dot) {
          <button
            (click)="currentIndex.set(dot)"
            [attr.aria-label]="'Ir al slide ' + (dot + 1)"
            [class]="currentIndex() === dot
              ? 'w-6 bg-[#00d2d3]'
              : 'w-2 bg-slate-600 hover:bg-slate-400'"
            class="h-2 rounded-full transition-all duration-300">
          </button>
        }
      </div>
    }

  </div>
</section>
